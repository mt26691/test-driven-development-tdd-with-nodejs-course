name: CI

# Run the checks on every push and on every pull request.
on:
  push:
  pull_request:

jobs:
  test:
    name: Type-check & test
    runs-on: ubuntu-latest

    # Connection strings for every step in the job. They point at the Postgres
    # service container below (published on localhost:5432 on the runner) and use
    # the same database names/credentials as the local docker-compose setup, so
    # "works on my machine" and "works in CI" stay in lock-step.
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/urlshortener
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/urlshortener_test

    # A PostgreSQL service container for the whole job. GitHub starts it before
    # the steps run and publishes its port on the runner. The health check makes
    # the job wait until Postgres is actually accepting connections, so no step
    # ever races a database that is still starting up.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: urlshortener
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d urlshortener"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate the Prisma client
        run: npx prisma generate

      - name: Apply migrations to the dev database
        run: npx prisma migrate deploy

      - name: Create the test database
        run: |
          PGPASSWORD=postgres createdb \
            -h localhost -p 5432 -U postgres urlshortener_test

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Integration tests
        run: npm run test:integration
